AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Connected Arena - Real-Time Multiplayer Fan Engagement (Challenge 4)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Layers:
      - !Ref CommonLayer
    Environment:
      Variables:
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        PLAYERS_TABLE: !Ref PlayersTable
        PREDICTIONS_TABLE: !Ref PredictionsTable
        MATCH_EVENTS_TABLE: !Ref MatchEventsTable
        GAME_ROOM_TABLE: !Ref GameRoomTable
        REGION: !Ref AWS::Region
        WS_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

# ── DynamoDB Tables ────────────────────────────────────────────────
Resources:

  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: ConnectedArena-Common
      Description: Shared utilities (ws, db, responses) for Connected Arena Lambdas
      ContentUri: ../backend/layers/common/
      CompatibleRuntimes:
        - python3.12
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.12


  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ConnectedArena-Connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ConnectedArena-Players
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: playerId
          AttributeType: S
      KeySchema:
        - AttributeName: playerId
          KeyType: HASH

  PredictionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ConnectedArena-Predictions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: predictionId
          AttributeType: S
      KeySchema:
        - AttributeName: predictionId
          KeyType: HASH

  MatchEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ConnectedArena-MatchEvents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: matchId
          AttributeType: S
        - AttributeName: eventTime
          AttributeType: S
      KeySchema:
        - AttributeName: matchId
          KeyType: HASH
        - AttributeName: eventTime
          KeyType: RANGE

  GameRoomTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ConnectedArena-GameRoom
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: roomId
          AttributeType: S
      KeySchema:
        - AttributeName: roomId
          KeyType: HASH

# ── WebSocket API ──────────────────────────────────────────────────

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: ConnectedArenaWebSocket
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub "integrations/${ConnectIntegration}"

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub "integrations/${DisconnectIntegration}"

  PredictRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: predict
      Target: !Sub "integrations/${PredictIntegration}"

  LeaderboardRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: leaderboard
      Target: !Sub "integrations/${LeaderboardIntegration}"

  # commentary route — lets the event emitter trigger AI commentary
  # via the WebSocket API as well as direct Lambda invocation
  CommentaryRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: commentary
      Target: !Sub "integrations/${CommentaryIntegration}"

  ChatRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: chat
      Target: !Sub "integrations/${ChatIntegration}"

  AdminActionRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: adminAction
      Target: !Sub "integrations/${AdminActionIntegration}"

  AvatarUploadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: avatarUpload
      Target: !Sub "integrations/${AvatarUploadIntegration}"

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: prod
      AutoDeploy: true

# ── Lambda Functions ───────────────────────────────────────────────

  ConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/functions/connect/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable

  DisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/functions/disconnect/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  BroadcastFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/functions/broadcast/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchEventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GameRoomTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  PredictFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/functions/predict/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  LeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/functions/leaderboard/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PlayersTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  BedrockCommentaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/functions/bedrock_commentary/
      Handler: handler.lambda_handler
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref PlayersTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/functions/chat/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  AdminActionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/functions/admin_action/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  AvatarUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/functions/avatar_upload/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          FRONTEND_BUCKET: !Ref FrontendBucket
          CDN_BASE: !Sub "https://${CloudFrontDistribution}.DomainName"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${FrontendBucket.Arn}/avatars/*"
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  # ── Event Emitter ──────────────────────────────────────────────────
  # Reads unprocessed events from DynamoDB on a schedule and
  # broadcasts them to all connected fans via BroadcastFunction.
  # Also invokes BedrockCommentaryFunction for high-impact events.
  EventEmitterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/functions/event_emitter/
      Handler: handler.lambda_handler
      Timeout: 60
      Environment:
        Variables:
          BROADCAST_FUNCTION_NAME: !Ref BroadcastFunction
          COMMENTARY_FUNCTION_NAME: !Ref BedrockCommentaryFunction
          MATCH_ID: "DFL-MAT-111111"
      Events:
        TickSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Enabled: true
            Description: Polls DynamoDB for new match events every minute
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchEventsTable
        - DynamoDBReadPolicy:
            TableName: !Ref GameRoomTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !GetAtt BroadcastFunction.Arn
                - !GetAtt BedrockCommentaryFunction.Arn

# ── Lambda Permissions (API Gateway → Lambda invoke) ──────────────

  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ConnectFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt DisconnectFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  PredictPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PredictFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  LeaderboardPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LeaderboardFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  CommentaryPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt BedrockCommentaryFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  ChatPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ChatFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  AdminActionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt AdminActionFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  AvatarUploadPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt AvatarUploadFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

# ── Lambda Integrations ────────────────────────────────────────────

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectFunction.Arn}/invocations"

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DisconnectFunction.Arn}/invocations"

  PredictIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PredictFunction.Arn}/invocations"

  LeaderboardIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LeaderboardFunction.Arn}/invocations"

  CommentaryIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BedrockCommentaryFunction.Arn}/invocations"

  ChatIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ChatFunction.Arn}/invocations"

  AdminActionIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AdminActionFunction.Arn}/invocations"

  AvatarUploadIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AvatarUploadFunction.Arn}/invocations"

# ── Outputs ────────────────────────────────────────────────────────

  # ── Frontend Hosting (S3 + CloudFront) ────────────────────────────

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "connected-arena-frontend-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: ['GET', 'PUT', 'POST', 'HEAD']
            AllowedOrigins: ['*']
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: ConnectedArenaOAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  RewriteHTMLFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: ConnectedArenaRewriteHTML
      AutoPublish: true
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          
          if (!uri.includes('.') && !uri.endsWith('/')) {
            request.uri = uri + '.html';
          }
          
          if (uri.endsWith('/')) {
            request.uri = uri + 'index.html';
          }
          
          return request;
        }
      FunctionConfig:
        Comment: "URL rewrite function for NextJS static hosting"
        Runtime: cloudfront-js-1.0

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods: [GET, HEAD, OPTIONS]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt RewriteHTMLFunction.FunctionMetadata.FunctionARN
        # Additional behavior for HTML pages (serve .html when path has no extension)
        CacheBehaviors:
          - PathPattern: "/*.html"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
            AllowedMethods: [GET, HEAD, OPTIONS]
        # SPA fallback — serve index.html for all 403/404s so React Router works
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100   # US + Europe only — cheapest tier

# ── Outputs ────────────────────────────────────────────────────────

Outputs:
  WebSocketURL:
    Description: WebSocket API URL
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  EventEmitterFunctionName:
    Description: Event Emitter Lambda function name (for manual invocation / testing)
    Value: !Ref EventEmitterFunction

  FrontendBucketName:
    Description: S3 bucket for frontend build artifacts
    Value: !Ref FrontendBucket

  FrontendURL:
    Description: CloudFront URL for the Connected Arena frontend
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
